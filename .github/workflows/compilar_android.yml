name: Compilar APK de Flet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configurar Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Flet y dependencias
      run: |
        pip install -r requirements.txt

    - name: Crear paquete APK ejecutable
      run: |
        flet build apk main.py --no-analytics

    - name: Guardar el archivo APK generado
      uses: actions/upload-artifact@v4
      with:
        name: Tecnotronic-APSTI-App
        path: build/apk/*.apk
